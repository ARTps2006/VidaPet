<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="stylesheet" href="perfil.css">
</head>

<body>

    <header>
        <nav class="menu">
            <div class="logo"><img src="LogoMenu.png"></div>
            <ul class="menuLinks">
                <li><a href="home.html">Home</a></li>
                <li><a href="animais.html">Animais</a></li>
                <li><a href="adotar.hmtl">Como Adotar</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contatos.html">Contato</a></li>
            </ul>

            <div class="Perfil_saida">
                <button onclick="perfil()" class="perfil"><img
                        src="person_24dp_000000_FILL0_wght400_GRAD0_opsz24.png"></button>
                <button onclick="sair()" class="sair"><img src="sair.png"></button>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">

            <form class="c" onsubmit="salvarAlteracoes(event)">
                <h2>Perfil</h2>

                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Digite seu e-mail">

                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" placeholder="Digite seu telefone">

                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha">

                <label for="data">Data de Nascimento</label>
                <input type="date" id="data" name="data">

                <button class="botao" type="submit">Salvar</button>
            </form>
        </div>
    </main>

</body>
<script src="perfil.js"></script>

</html>
