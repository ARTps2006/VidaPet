<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidaPet</title>

    <link rel="icon" type="image/png" sizes="32x32" href="logo VidaPet.png">
    <link rel="stylesheet" href="perfil.css">

</head>

<body>

    <!-- HEADER -->

    <header>

        <nav class="menu">

            <div class="logo">
                <img src="LogoMenu.png">
            </div>

            <ul class="menuLinks">
                <li><a href="home.html">Home</a></li>
                <li><a href="animais.html">Animais</a></li>
                <li><a href="adotar.html">Como Adotar</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contatos.html">Contato</a></li>
            </ul>

            <div class="Perfil_saida">

                <button onclick="perfil()" class="perfil">
                    <img src="person_24dp_000000_FILL0_wght400_GRAD0_opsz24.png">
                </button>

                <button onclick="sair()" class="sair">
                    <img src="sair.png">
                </button>

            </div>

        </nav>
        
    </header>
    
    <main>
        <div class="container">
            
            <form class="c" onsubmit="salvarAlteracoes(event)">
                
                <img class="cachorroPerfil" src=".vscode/cachorroPerfil.jpg">
                <h2>Perfil</h2>

                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Digite seu e-mail">

                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" placeholder="Digite seu telefone">

                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha">

                <label for="data">Data de Nascimento</label>
                <input type="date" id="data" name="data">

                <button class="botao" type="submit">Salvar</button>
            </form>
        </div>
    </main>

    <!-- RODAPÉ -->

    <footer class="rodape">

        <div class="rodape-conteudo">

            <div>
                <h3>VidaPet</h3>
                <p>ONG dedicada ao resgate e adoção de animais.</p>
            </div>

            <div>
                <h3>Contato</h3>
                <p>Email: contato@vidapet.com</p>
                <p>Telefone: (11) 99999-9999</p>
            </div>

            <div>
                <h3>Redes sociais</h3>
                <p>Instagram</p>
                <p>Facebook</p>
            </div>

        </div>

        <p class="copyright">
            © 2026 VidaPet
        </p>

    </footer>

</body>
<script src="perfil.js"></script>

</html>
