<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="cadastro.css">

</head>

<body>

    <div class="container">

        <!-- Lado esquerdo -->
        <div class="lado-esquerdo">

            <form class="c">

                <h2>Cadastro</h2>

                <input type="text" id="nome" placeholder="Nome:">

                <input type="text" id="usuario" placeholder="Usuário:">

                <input type="email" id="email" placeholder="Email:">

                <input type="tel" id="telefone" placeholder="Telefone:" maxlength="11">

                <input type="password" id="senha" placeholder="Senha:">

                <input type="password" id="confirmarSenha" placeholder="Confirmar Senha:">

                <input type="date" id="data" placeholder="Data de nascimento">

                <button type="button" onclick="cadastrar()">Cadastrar</button>

                <div class="linkC">

                    <p>Já tem uma conta?</p>

                    <a href="login.html">Entrar</a>
                </div>
                <p class="m" id="mensagemErro"></p>
                <p class="s" id="mensagemSucesso"></p>
            </form>

        </div>

        <!-- Lado direito -->
        <div class="lado-direito">

            <img src="logo VidaPet.png">

        </div>

        <script src="cadastro.js"></script>

</body>

</html>
